name: build-test

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - uses: NuGet/setup-nuget@v2
      - name: Restore packages
        run: nuget restore "SX3 SCANER.sln"
      - name: Build Release x64
        run: msbuild "SX3 SCANER.sln" /t:Rebuild /p:Configuration=Release /p:Platform=x64 /m /v:minimal
      - name: Run tests
        run: .\Tests\bin\Release\SX3.Scanner.Tests.exe
