name: Validate SX3 Release Manifest

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  validate-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Validate version.json
        shell: pwsh
        run: |
          $manifest = Get-Content -Raw -LiteralPath version.json | ConvertFrom-Json
          $expectedTag = "${{ github.ref_name }}"
          $expectedVersion = $expectedTag.TrimStart("v")

          if ($manifest.tagName -ne $expectedTag) {
            throw "version.json tagName '$($manifest.tagName)' does not match '$expectedTag'."
          }

          if ($manifest.version -ne $expectedVersion) {
            throw "version.json version '$($manifest.version)' does not match '$expectedVersion'."
          }

          if ([string]::IsNullOrWhiteSpace($manifest.downloadUrl)) {
            throw "version.json downloadUrl is empty."
          }
